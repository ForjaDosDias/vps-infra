events {
  worker_connections 1024;
}

http {
  # DNS interno do Docker — resolve upstreams em tempo de requisição
  resolver 127.0.0.11 valid=10s ipv6=off;

  # IP real do visitante via Cloudflare
  real_ip_header CF-Connecting-IP;

  # ── EstudeOAB — forjadosdias.com.br ─────────────────────────────────
  server {
    listen 80;
    server_name forjadosdias.com.br www.forjadosdias.com.br;

    location / {
      set $upstream_estudeoab estude-nginx;
      proxy_pass            http://$upstream_estudeoab:80;
      proxy_set_header      Host $host;
      proxy_set_header      X-Real-IP $http_cf_connecting_ip;
      proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    300s;
      proxy_send_timeout    300s;
      client_max_body_size  100m;
    }
  }

  # ── EstudeOAB — aprovadonaoab.com.br ────────────────────────────────
  server {
    listen 80;
    server_name aprovadonaoab.com.br www.aprovadonaoab.com.br;

    location / {
      set $upstream_estudeoab estude-nginx;
      proxy_pass            http://$upstream_estudeoab:80;
      proxy_set_header      Host $host;
      proxy_set_header      X-Real-IP $http_cf_connecting_ip;
      proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    300s;
      proxy_send_timeout    300s;
      client_max_body_size  100m;
    }
  }

  # ── Tamois — tamois.com.br ──────────────────────────────────────────
  server {
    listen 80;
    server_name tamois.com.br www.tamois.com.br;

    location / {
      set $upstream_tamois tamois;
      proxy_pass            http://$upstream_tamois:80;
      proxy_set_header      Host $host;
      proxy_set_header      X-Real-IP $http_cf_connecting_ip;
      proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    120s;
      proxy_send_timeout    120s;
      client_max_body_size  20m;
    }
  }
}
