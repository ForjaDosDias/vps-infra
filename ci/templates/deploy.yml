# Template deploy — roda no self-hosted runner da VPS, só em push na main (pós-merge aprovado).
# Copiar para <repo>/.github/workflows/deploy.yml e ajustar:
#   - SRC_DIR     : checkout de produção do código (onde o git pull acontece)
#   - COMPOSE_DIR : onde roda `docker compose` (NaoEsqueci usa vps-infra/naoesqueci;
#                   EstudeOAB/Amanuense têm o compose no próprio repo, então SRC_DIR == COMPOSE_DIR)
#   - REPO, CONTAINER, concurrency.group
# Tamois é exceção: usa `kamal deploy` em vez de docker compose.
#
# Exemplo abaixo preenchido para NaoEsqueci.
name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-naoesqueci
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: [self-hosted, vps-prod]
    env:
      SRC_DIR: /home/victor/Projetos/Publicado/NaoEsqueci
      COMPOSE_DIR: /home/victor/Projetos/vps-infra/naoesqueci
      REPO: ForjaDosDias/NaoEsqueci2
      CONTAINER: naoesqueci
    steps:
      - name: Atualizar código de produção
        run: |
          cd "$SRC_DIR"
          git fetch "https://x-access-token:${{ github.token }}@github.com/${REPO}.git" main
          git reset --hard FETCH_HEAD

      - name: Rebuild e subir container (aguarda ficar healthy)
        run: |
          cd "$COMPOSE_DIR"
          docker compose up -d --build --wait --wait-timeout 180

      - name: Logs em caso de falha
        if: failure()
        run: |
          cd "$COMPOSE_DIR"
          docker compose logs --tail=80 "$CONTAINER" || true
