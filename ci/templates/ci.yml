# Template CI — testes (GitHub-hosted). Vira o status check obrigatório "test".
# Copiar para <repo>/.github/workflows/ci.yml e ajustar a etapa de testes por stack.
name: ci

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
