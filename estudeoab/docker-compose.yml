version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: estudeoab
      POSTGRES_USER: estudeoab
      POSTGRES_PASSWORD: estudeoab_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    # sem port binding — PostgreSQL acessível apenas dentro da rede Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estudeoab -d estudeoab"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://estudeoab:estudeoab_pass@db:5432/estudeoab
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY env var is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY env var is required}
      RESEND_FROM: ${RESEND_FROM:-noreply@aprovanoab.com.br}
      APP_URL: ${APP_URL:-https://aprovanoab.com.br}
    # sem port binding — API acessível apenas via nginx dentro da rede Docker
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    container_name: estude-nginx
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - default    # rede interna compartilhada com backend/db
      - vps-proxy  # rede externa para o nginx-proxy rotear

volumes:
  postgres_data:

networks:
  vps-proxy:
    external: true
